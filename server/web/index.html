<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gift Exchange</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Gift Exchange</h1>
    <div class="header-actions">
      <input type="file" id="import-file-input" accept=".json" hidden>
      <button id="btn-import">Import JSON</button>
    </div>
  </header>

  <div class="layout">
    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
      <details class="sidebar-section" open>
        <summary>Participants</summary>
        <ul id="participant-list"></ul>
        <div class="add-row">
          <input id="new-participant-name" type="text" placeholder="Name" maxlength="60" autocomplete="off">
          <button id="btn-add-participant">Add</button>
        </div>
        <div id="participant-error" class="field-error"></div>
      </details>

      <details class="sidebar-section" open>
        <summary>Relationships</summary>
        <ul id="relationship-list"></ul>
        <div class="add-row rel-add-row">
          <select id="rel-a"></select>
          <span class="arrow-sep">↔</span>
          <select id="rel-b"></select>
          <button id="btn-add-relationship">Add</button>
        </div>
      </details>

      <details class="sidebar-section" open>
        <summary>Blocks</summary>
        <ul id="block-list"></ul>
        <div class="add-row block-add-row">
          <select id="block-from"></select>
          <span class="arrow-sep">→</span>
          <select id="block-to"></select>
          <button id="btn-add-block">Add</button>
        </div>
      </details>

      <details class="sidebar-section">
        <summary>Options</summary>
        <div class="option-fields">
          <label>
            Max results
            <input id="opt-max-solutions" type="number" min="1" max="20" value="5">
          </label>
          <label>
            Seed <span class="hint">(blank = random)</span>
            <input id="opt-seed" type="number" min="1" placeholder="auto">
          </label>
        </div>
      </details>

      <div class="generate-row">
        <button id="btn-generate" class="btn-primary">Generate</button>
        <div id="generate-error" class="field-error"></div>
      </div>
    </aside>

    <!-- MAIN PANEL -->
    <main class="main-panel">
      <div id="graph-container">
        <svg id="graph-svg"></svg>
        <div id="graph-empty" class="empty-state">Add participants, then click Generate</div>
      </div>

      <div id="solutions-panel">
        <div id="solutions-header">
          <span class="solutions-label">Solutions</span>
          <div id="solution-tabs"></div>
          <button id="btn-add-history" class="btn-secondary" hidden>Add as history blocks</button>
          <button id="btn-download" class="btn-secondary" hidden>Download JSON</button>
        </div>
        <div id="solution-detail"></div>
      </div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
