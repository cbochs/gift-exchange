apiVersion: v1
kind: Service
metadata:
  name: {{ include "gift-exchange.name" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "gift-exchange.labels" . | nindent 4 }}
spec:
  selector: {{- include "gift-exchange.selectorLabels" . | nindent 4 }}
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
